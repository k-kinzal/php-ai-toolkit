# EXAMPLE ONLY: use for PHPStan extension/toolkit packages with these components.
deptrac:
  paths:
    - ./src
  exclude_files:
    - '#.*/tests?/.*#'
    - '#.*/vendor/.*#'
  layers:
    - name: Installer
      collectors:
        - type: directory
          value: src/Installer/.*
    - name: LocGuard
      collectors:
        - type: directory
          value: src/LocGuard/.*
    - name: PhpStanRule
      collectors:
        - type: directory
          value: src/PhpStan/Rule/.*
    - name: PhpStanSupport
      collectors:
        - type: directory
          value: src/PhpStan/Support/.*
    - name: PhpStanErrorFormatter
      collectors:
        - type: directory
          value: src/PhpStan/ErrorFormatter/.*
    - name: PhpUnitTestReporter
      collectors:
        - type: directory
          value: src/PhpUnit/TestReporter/.*
    - name: Shared
      collectors:
        - type: directory
          value: src/Shared/.*
  ruleset:
    Installer: ~
    LocGuard: ~
    PhpStanRule:
      - PhpStanSupport
    PhpStanSupport: ~
    PhpStanErrorFormatter:
      - Shared
    PhpUnitTestReporter:
      - Shared
    Shared: ~
